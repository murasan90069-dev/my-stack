<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIスタックちゃん・操作パネル</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; line-height: 1.6; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.3rem; text-align: center; color: #2c3e50; border-bottom: 3px solid #4A90E2; padding-bottom: 10px; margin-top: 0; }
        .box { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; background-color: #fafafa; }
        label { display: block; font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; color: #444; }
        
        input[type="text"], input[type="number"] { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem;
        }
        
        /* 返信を表示するエリアを強調 */
        #responseArea { 
            background-color: #e3f2fd; border-radius: 8px; padding: 15px; 
            font-size: 1.1rem; color: #1565c0; min-height: 60px; border: 1px solid #bbdefb; white-space: pre-wrap;
            font-weight: bold;
        }

        button { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; font-size: 1rem; margin-top: 10px; transition: 0.2s;
        }
        button:active { transform: translateY(2px); }

        .send-btn { background: #4A90E2; color: white; margin-top: 15px; }
        .send-btn:hover { background: #357ABD; }
        
        .mic-btn { background: #ff5722; color: white; margin-bottom: 10px; }
        .mic-btn:hover { background: #e64a19; }
        
        .setting-btn { background: #607d8b; color: white; }
        .setting-btn:hover { background: #455a64; }

        .status-msg { font-size: 0.85rem; color: #ff5722; font-weight: bold; margin: 5px 0; min-height: 1.2em; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 スタックちゃん操作盤</h1>

    <div class="box">
        <label>スタックちゃんの返事:</label>
        <div id="responseArea">お話ししよう様なのだ！</div>
    </div>

    <div class="box">
        <label>メッセージを送る:</label>
        <button id="micBtn" class="mic-btn" onclick="startSpeech()">🎤 声で入力する</button>
        <div id="micStatus" class="status-msg"></div>
        <input type="text" id="chatInput" placeholder="お話しする内容を入力...">
        <button class="send-btn" onclick="sendChat()">送信なのだ！</button>
        <div id="sendStats" class="status-msg" style="color: #4A90E2; margin-top: 10px;"></div>
    </div>

    <div class="box">
        <label>音量 (0-255):</label>
        <input type="number" id="volumeInput" value="100" min="0" max="255">
        <button class="setting-btn" onclick="setSetting('volume', 'volumeInput')">音量を変更</button>
    </div>
</div>

<script>
    const STACKCHAN_IP = "192.168.1.116"; 

    // --- 音声認識 ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        const btn = document.getElementById('micBtn');
        btn.innerText = "❌ ブラウザが音声非対応";
        btn.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;

        recognition.onstart = () => {
            document.getElementById('micStatus').innerText = "👂 聴取中...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('chatInput').value = transcript;
            document.getElementById('micStatus').innerText = "✅ 聞き取り成功！";
        };

        recognition.onerror = () => {
            document.getElementById('micStatus').innerText = "❌ エラー！もう一度ボタンを！";
        };

        recognition.onend = () => {
            setTimeout(() => { document.getElementById('micStatus').innerText = ""; }, 2000);
        };

        window.startSpeech = () => recognition.start();
    }

    // --- チャット送信処理 ---
    async function sendChat() {
        const chatInput = document.getElementById('chatInput');
        const status = document.getElementById('sendStats');
        const responseArea = document.getElementById('responseArea');
        const text = chatInput.value;
        
        if (!text) return;
        
        status.innerText = "考え中なのだ...";
        responseArea.innerText = "スタックちゃんが考えているのだ...";
        
        try {
            const response = await fetch(`http://${STACKCHAN_IP}/chat?text=${encodeURIComponent(text)}`);
            const replyText = await response.text();
            
            responseArea.innerText = replyText;
            status.innerText = "返信が届いたのだ！";
        } catch (e) {
            console.error(e);
            status.innerText = "通信完了なのだ（返信取得不可）";
        }

        setTimeout(() => { status.innerText = ""; }, 3000);
        chatInput.value = "";
    }

    // --- 設定変更 ---
    function setSetting(param, inputId) {
        const val = document.getElementById(inputId).value;
        fetch(`http://${STACKCHAN_IP}/setting?${param}=${val}`);
        alert("設定を送信したのだ！");
    }
</script>

</body>
</html>
