<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ずんだもん・調整リモコン</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #e8f5e9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background-color: #4caf50; color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 1.1em; flex-shrink: 0; }
        
        /* 調整用エリア */
        .admin-area { background: #fffde7; padding: 10px; border-bottom: 2px solid #fbc02d; text-align: center; }
        .fix-btn { background-color: #fbc02d; color: #333; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; border-bottom: 3px solid #f9a825; }
        .fix-btn:active { transform: translateY(2px); border-bottom: none; }

        /* 入力エリア */
        .input-area { background: #fff; padding: 15px; display: flex; gap: 8px; border-bottom: 1px solid #ddd; z-index: 10; flex-shrink: 0; }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #4caf50; border-radius: 10px; font-size: 16px; outline: none; }
        button.send-btn { background-color: #108C; color: white; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* ログエリア */
        #chat-log { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; gap: 10px; background: #f9fff9; }
        .bubble { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background-color: #108C; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background-color: white; color: #333; border-bottom-left-radius: 2px; border: 1px solid #ddd; }
        
        .hint { font-size: 11px; color: #666; text-align: center; margin: 5px 0; }
    </style>
</head>
<body>
    <header>ずんだもん・調整リモコン</header>
    
    <div class="admin-area">
        <button class="fix-btn" onclick="fixServo()">📏 サーボを90度に固定（調整用）</button>
        <div class="hint">組み立て時はこれを押してからパーツを差すのだ！</div>
    </div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="ここに入力するのだ！">
        <button class="send-btn" onclick="send()">送信</button>
    </div>

    <div id="chat-log">
        <div class="bubble bot">準備万端なのだ！<br>90度に固定して組み立てを開始するのだ。</div>
    </div>

    <script>
        const IP = "192.168.1.83";

        // サーボを90度に固定する命令
        async function fixServo() {
            try {
                // スタックちゃんのAPIに合わせて調整（通常は /face や /move など）
                // 汎用的な「正面を向く」コマンドを送信
                await fetch(`http://${IP}/chat?text=${encodeURIComponent("正面を向いて")}`);
                alert("90度固定命令を送ったのだ！動かなくなったらパーツを差すのだ。");
            } catch (e) {
                alert("通信エラーなのだ。IPアドレスを確認してほしいのだ。");
            }
        }

        async function send() {
            const input = document.getElementById('msg');
            const text = input.value.trim();
            if (!text) return;

            const log = document.getElementById('chat-log');
            const userBubble = document.createElement('div');
            userBubble.className = 'bubble user';
            userBubble.innerText = text;
            log.prepend(userBubble);

            try {
                await fetch(`http://${IP}/chat?text=${encodeURIComponent(text)}`);
            } catch (e) {
                console.error("送信エラー", e);
            }
            
            input.value = '';
            input.focus();
        }

        document.getElementById('msg').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
