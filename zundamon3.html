<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ずんだもん・調整リモコン</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #e8f5e9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #4caf50; color: white; padding: 12px; text-align: center; font-weight: bold; flex-shrink: 0; }
        
        /* 調整エリア */
        .admin-area { background: #fffde7; padding: 10px; border-bottom: 2px solid #fbc02d; text-align: center; flex-shrink: 0; }
        .fix-btn { background-color: #fbc02d; color: #333; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* ログ表示エリア（ここを改善したのだ！） */
        #chat-log { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; /* 上から順に並べる */
            gap: 10px; 
            background: #f9fff9;
        }

        /* 入力エリア（画面下部に固定） */
        .input-area { 
            background: #fff; 
            padding: 15px; 
            display: flex; 
            gap: 8px; 
            border-top: 1px solid #ddd; 
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom); /* iPhoneのバー対策 */
        }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #4caf50; border-radius: 10px; font-size: 16px; }
        button.send-btn { background-color: #108C; color: white; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; }

        .bubble { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 15px; }
        .user { align-self: flex-end; background-color: #108C; color: white; }
        .bot { align-self: flex-start; background-color: white; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <header>ずんだもん・調整リモコン</header>
    
    <div class="admin-area">
        <button class="fix-btn" onclick="fixServo()">📏 サーボを90度に固定（調整用）</button>
    </div>

    <div id="chat-log">
        <div class="bubble bot">IPアドレスを修正して準備OKなのだ！<br>90度に固定ボタンを押してみてなのだ。</div>
    </div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="入力するのだ！">
        <button class="send-btn" onclick="send()">送信</button>
    </div>

    <script>
        // ★ここを新しいIPアドレスに書き換えてなのだ！
        const IP = "192.168.1.82"; 

        async function fixServo() {
            addLog("bot", "90度固定命令を送信中...");
            try {
                await fetch(`http://${IP}/chat?text=${encodeURIComponent("正面を向いて")}`);
                alert("送信成功！スタックちゃんを見てなのだ。");
            } catch (e) {
                alert("通信エラー。IPが正しいか確認なのだ。");
            }
        }

        async function send() {
            const input = document.getElementById('msg');
            const text = input.value.trim();
            if (!text) return;
            addLog("user", text);
            try {
                await fetch(`http://${IP}/chat?text=${encodeURIComponent(text)}`);
            } catch (e) {}
            input.value = '';
        }

        function addLog(type, text) {
            const log = document.getElementById('chat-log');
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = text;
            log.appendChild(b);
            log.scrollTop = log.scrollHeight; // 常に最新へスクロール
        }

        document.getElementById('msg').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
