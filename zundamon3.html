<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ずんだもん・調整リモコン</title>
    <style>
        body { font-family: sans-serif; background-color: #e8f5e9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #4caf50; color: white; padding: 10px; text-align: center; font-weight: bold; flex-shrink: 0; }
        
        /* 1. 調整ボタン */
        .admin-area { background: #fffde7; padding: 10px; border-bottom: 2px solid #fbc02d; text-align: center; flex-shrink: 0; }
        .fix-btn { background-color: #fbc02d; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* 2. 入力エリア（上に戻したのだ！） */
        .input-area { background: #fff; padding: 15px; display: flex; gap: 8px; border-bottom: 1px solid #ddd; flex-shrink: 0; }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #4caf50; border-radius: 10px; font-size: 16px; }
        button.send-btn { background-color: #108C; color: white; border: none; padding: 0 15px; border-radius: 10px; font-weight: bold; }

        /* 3. チャット表示（今のまま） */
        #chat-log { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f9fff9; }
        .bubble { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 15px; }
        .user { align-self: flex-end; background-color: #108C; color: white; }
        .bot { align-self: flex-start; background-color: white; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <header>ずんだもん・調整リモコン</header>
    
    <div class="admin-area">
        <button class="fix-btn" onclick="fixServo()">📏 サーボを90度に固定</button>
    </div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="ここに入力！">
        <button class="send-btn" onclick="send()">送信</button>
    </div>

    <div id="chat-log">
        <div class="bubble bot">IPアドレスとセキュリティ設定を確認してなのだ！</div>
    </div>

    <script>
        // ★ここを新しいIPアドレスに書き換えてなのだ！
        const IP = "192.168.1.82"; 

        async function fixServo() {
            addLog("bot", "90度固定命令を送信中...");
            sendToStackchan("正面を向いて");
        }

        async function send() {
            const input = document.getElementById('msg');
            const text = input.value.trim();
            if (!text) return;
            addLog("user", text);
            sendToStackchan(text);
            input.value = '';
        }

        function sendToStackchan(text) {
            // httpsのサイトからhttpのIPに送るための特殊な処理
            fetch(`http://${IP}/chat?text=${encodeURIComponent(text)}`, { mode: 'no-cors' })
            .then(() => {
                if(text === "正面を向いて") alert("送信しました！スタックちゃんが動くか確認なのだ。");
            })
            .catch(e => {
                alert("送信に失敗したのだ。設定を確認してなのだ。");
            });
        }

        function addLog(type, text) {
            const log = document.getElementById('chat-log');
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = text;
            log.appendChild(b);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
